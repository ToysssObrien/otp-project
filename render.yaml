services:
  - type: web
    name: otp-project
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEV_OTP_MODE
        value: "false"
      - key: DEFAULT_COUNTRY_CODE
        value: "855"
      - key: OTP_PROVIDER
        value: "infobip"
      - key: INFOBIP_BASE_URL
        value: "https://api.infobip.com"
      - key: INFOBIP_SENDER
        value: "ServiceSMS"
      - key: INFOBIP_API_KEY
        sync: false
