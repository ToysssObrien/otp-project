services:
  - type: keyvalue
    name: otp-redis
    plan: starter
    region: singapore
    ipAllowList:
      - source: 0.0.0.0/32
        description: blocked-public-access
    maxmemoryPolicy: noeviction
  - type: web
    name: otp-project
    runtime: python
    plan: starter
    region: singapore
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt && npm ci && npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --proxy-headers
    envVars:
      - key: DEV_OTP_MODE
        value: "false"
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: USE_FAKE_REDIS
        value: "false"
      - key: DEFAULT_COUNTRY_CODE
        value: "855"
      - key: OTP_PROVIDER
        value: "plasgate"
      - key: OTP_TTL_SECONDS
        value: "300"
      - key: REQUEST_OTP_COOLDOWN_SECONDS
        value: "60"
      - key: VERIFY_OTP_MAX_ATTEMPTS
        value: "5"
      - key: ADMIN_DASHBOARD_ENABLED
        value: "true"
      - key: ADMIN_DASHBOARD_USERNAME
        sync: false
      - key: ADMIN_DASHBOARD_PASSWORD
        sync: false
      - key: ADMIN_DASHBOARD_REALM
        value: "OTP Admin Monitor"
      - key: ADMIN_SESSION_COOKIE_NAME
        value: "otp_admin_session"
      - key: ADMIN_SESSION_DURATION_SECONDS
        value: "28800"
      - key: ADMIN_SESSION_COOKIE_SECURE
        value: "true"
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: REQUEST_OTP_RATE_LIMIT
        value: "1/minute"
      - key: VERIFY_OTP_RATE_LIMIT
        value: "10/minute"
      - key: METRICS_EVENT_LIMIT
        value: "200"
      - key: METRICS_TOP_LIMIT
        value: "10"
      - key: PROVIDER_FAILURE_WINDOW_SECONDS
        value: "900"
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: otp-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: otp-redis
          property: port
      - key: PLASGATE_SECRET_KEY
        sync: false
      - key: PLASGATE_PRIVATE_KEY
        sync: false
      - key: PLASGATE_SENDER
        value: "PlasGateUAT"
      - key: GOOGLE_SHEETS_BACKUP_ENABLED
        value: "false"
      - key: GOOGLE_SHEETS_BACKUP_STRICT
        value: "false"
      - key: GOOGLE_SHEETS_BACKUP_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_BACKUP_SHEET_NAME
        value: "Customers"
      - key: GOOGLE_SHEETS_BACKUP_DASHBOARD_SHEET_NAME
        value: "Dashboard"
      - key: GOOGLE_SHEETS_BACKUP_INTERVAL_SECONDS
        value: "300"
      - key: GOOGLE_SHEETS_BACKUP_TIMEOUT_SECONDS
        value: "15"
      - key: GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON
        sync: false
