<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        :root {
            --bg: #101828;
            --panel: #ffffff;
            --text: #111827;
            --muted: #667085;
            --line: #d0d5dd;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, "Tahoma", sans-serif;
        }

        .container {
            width: min(420px, calc(100vw - 32px));
        }

        .card {
            background: var(--panel);
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 26px;
            line-height: 1.25;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #344054;
            font-size: 14px;
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 46px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
        }

        button {
            width: 100%;
            min-height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        #verify-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eaecf0;
        }

        .status-msg {
            display: none;
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .status-msg.success {
            display: block;
            background: #ecfdf3;
            color: #067647;
            border: 1px solid #abefc6;
        }

        .status-msg.error {
            display: block;
            background: #fef3f2;
            color: #b42318;
            border: 1px solid #fecdca;
        }

        .loader {
            width: 18px;
            height: 18px;
            display: none;
            border: 2px solid white;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .footer {
            margin-top: 16px;
            color: #cbd5e1;
            text-align: center;
            font-size: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>ยืนยันตัวตน</h1>
            <p class="subtitle">ทดสอบการขอและยืนยันรหัส OTP ก่อนเชื่อมต่อ SMS จริง</p>

            <div id="request-section">
                <div class="form-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" placeholder="0971234567 หรือ +855971234567" maxlength="16" autocomplete="tel">
                </div>
                <button id="btn-request" type="button" onclick="handleRequestOTP()">
                    <span class="loader" id="loader-request"></span>
                    <span id="text-request">ขอรหัส OTP</span>
                </button>
            </div>

            <div id="verify-section">
                <div class="form-group">
                    <label for="otp">รหัส OTP 6 หลัก</label>
                    <input type="text" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                </div>
                <button id="btn-verify" type="button" onclick="handleVerifyOTP()">
                    <span class="loader" id="loader-verify"></span>
                    <span id="text-verify">ยืนยันรหัส</span>
                </button>
            </div>

            <div id="status" class="status-msg"></div>
        </section>
        <div class="footer">OTP Backend Service</div>
    </main>

    <script>
        const statusDiv = document.getElementById("status");
        const verifySection = document.getElementById("verify-section");

        function showStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.className = `status-msg ${isError ? "error" : "success"}`;
        }

        function setLoading(type, isLoading) {
            const loader = document.getElementById(`loader-${type}`);
            const text = document.getElementById(`text-${type}`);
            const button = document.getElementById(`btn-${type}`);

            loader.style.display = isLoading ? "inline-block" : "none";
            text.style.opacity = isLoading ? "0.55" : "1";
            button.disabled = isLoading || button.dataset.locked === "true";
        }

        async function parseResponse(response) {
            const contentType = response.headers.get("content-type") || "";
            if (contentType.includes("application/json")) {
                return response.json();
            }
            return { detail: await response.text() };
        }

        async function handleRequestOTP() {
            const phoneInput = document.getElementById("phone");
            const phone = phoneInput.value.trim();

            if (!phone || phone.length < 9) {
                showStatus("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง", true);
                return;
            }

            setLoading("request", true);

            try {
                const response = await fetch("/request-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone })
                });
                const data = await parseResponse(response);

                if (!response.ok) {
                    showStatus(data.detail || "เกิดข้อผิดพลาดในการขอ OTP", true);
                    return;
                }

                showStatus(data.message || "ส่งรหัส OTP สำเร็จ");
                verifySection.style.display = "block";
                document.getElementById("btn-request").dataset.locked = "true";
                phoneInput.disabled = true;
            } catch (error) {
                showStatus("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้", true);
            } finally {
                setLoading("request", false);
            }
        }

        async function handleVerifyOTP() {
            const phone = document.getElementById("phone").value.trim();
            const otpInput = document.getElementById("otp");
            const otp = otpInput.value.trim();

            if (!/^\d{6}$/.test(otp)) {
                showStatus("กรุณากรอกรหัส OTP 6 หลัก", true);
                return;
            }

            setLoading("verify", true);

            try {
                const response = await fetch("/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, otp })
                });
                const data = await parseResponse(response);

                if (!response.ok) {
                    showStatus(data.detail || "รหัส OTP ไม่ถูกต้อง", true);
                    return;
                }

                showStatus(data.message || "ยืนยันรหัส OTP สำเร็จ");
                const verifyButton = document.getElementById("btn-verify");
                verifyButton.dataset.locked = "true";
                verifyButton.style.background = "var(--success)";
                otpInput.disabled = true;
            } catch (error) {
                showStatus("ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้", true);
            } finally {
                setLoading("verify", false);
            }
        }
    </script>
</body>
</html>
